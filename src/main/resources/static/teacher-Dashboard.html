<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        /* Header */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header span {
            font-size: 18px;
            font-weight: bold;
        }

        .logout-button {
            padding: 8px 14px;
            cursor: pointer;
        }

        /* Class selector — centered */
        .class-section {
            text-align: center;
            padding: 24px 20px 10px;
        }

        .class-section label {
            font-weight: bold;
            font-size: 15px;
            margin-right: 10px;
        }

        .class-section select {
            padding: 10px;
            width: 260px;
            font-size: 14px;
        }

        /* Two-column student selectors */
        .students-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 16px 40px 0;
        }

        .student-col {
            display: flex;
            flex-direction: column;
            min-width: 220px;
        }

        .student-col label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .student-col select {
            padding: 10px;
            font-size: 14px;
        }

        /* Compare button */
        .compare-section {
            text-align: center;
            padding: 18px;
        }

        .compare-section button {
            padding: 10px 32px;
            cursor: pointer;
            font-size: 15px;
        }

        /* Status messages */
        .status-row {
            text-align: center;
            min-height: 24px;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .loading {
            color: #2980b9;
            font-size: 14px;
        }

        /* Similarity display */
        .similarity-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            padding: 12px 0 4px;
        }

        /* Two file-content boxes */
        .files-row {
            display: flex;
            gap: 20px;
            padding: 16px 40px 40px;
        }

        .file-box {
            flex: 1;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 12px;
            min-width: 0;
        }

        .file-box h4 {
            margin: 0 0 8px;
            font-size: 13px;
            color: #555;
            word-break: break-all;
        }

        .file-box pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 12px;
            font-family: "Courier New", monospace;
            max-height: 450px;
            overflow-y: auto;
            background: #f8f8f8;
            padding: 10px;
            border-radius: 4px;
        }

    </style>

</head>
<body>

<div class="header">
    <span>Teacher Dashboard</span>
    <button class="logout-button" onclick="logout()">Logout</button>
</div>


<!-- Class selector — centered at top -->
<div class="class-section">
    <label for="classDropdown">Select Class:</label>
    <select id="classDropdown" onchange="loadStudents()">
        <option value="">-- Select Class --</option>
    </select>
</div>


<!-- Student selectors — side by side -->
<div class="students-row">

    <div class="student-col">
        <label for="student1Dropdown">Student 1</label>
        <select id="student1Dropdown">
            <option value="">-- Select Student --</option>
        </select>
    </div>

    <div class="student-col">
        <label for="student2Dropdown">Student 2</label>
        <select id="student2Dropdown">
            <option value="">-- Select Student --</option>
        </select>
    </div>

</div>


<div class="compare-section">
    <button onclick="compareStudents()">Compare</button>
</div>

<div class="status-row">
    <div id="loadingMessage" class="loading"></div>
    <div id="errorMessage" class="error"></div>
</div>

<div id="similarityDisplay" class="similarity-display" style="display:none;"></div>

<!-- File content boxes — hidden until a compare runs -->
<div class="files-row" id="filesRow" style="display:none;">

    <div class="file-box">
        <h4 id="fileBox1Label">Student 1</h4>
        <pre id="fileBox1"></pre>
    </div>

    <div class="file-box">
        <h4 id="fileBox2Label">Student 2</h4>
        <pre id="fileBox2"></pre>
    </div>

</div>


<script>

    let authToken = localStorage.getItem("authToken") || "";


    window.onload = function() {
        if (!authToken) {
            window.location.href = "teacher-Login.html";
            return;
        }
        loadClasses();
    };


    function logout() {
        localStorage.removeItem("authToken");
        window.location.href = "teacher-Login.html";
    }


    async function loadClasses() {

        const errorDiv   = document.getElementById("errorMessage");
        const loadingDiv = document.getElementById("loadingMessage");
        const dropdown   = document.getElementById("classDropdown");

        errorDiv.textContent   = "";
        loadingDiv.textContent = "Loading classes...";

        try {
            const response = await fetch("/api/classes", {
                headers: { "Authorization": "Bearer " + authToken }
            });

            const data = await response.json();
            loadingDiv.textContent = "";
            dropdown.innerHTML = '<option value="">-- Select Class --</option>';

            if (Array.isArray(data)) {
                data.forEach(c => {
                    const option = document.createElement("option");
                    option.value = c;
                    option.textContent = c;
                    dropdown.appendChild(option);
                });
            } else {
                errorDiv.textContent = "Unexpected response from server.";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Unable to load classes.";
            console.error(error);
        }
    }


    async function loadStudents() {

        const classCode  = document.getElementById("classDropdown").value;
        const student1   = document.getElementById("student1Dropdown");
        const student2   = document.getElementById("student2Dropdown");
        const errorDiv   = document.getElementById("errorMessage");
        const loadingDiv = document.getElementById("loadingMessage");

        errorDiv.textContent = "";
        document.getElementById("similarityDisplay").style.display = "none";
        document.getElementById("filesRow").style.display = "none";

        student1.innerHTML = '<option value="">-- Select Student --</option>';
        student2.innerHTML = '<option value="">-- Select Student --</option>';

        if (!classCode) return;

        loadingDiv.textContent = "Loading students...";

        try {
            const response = await fetch(
                "/api/class/students?classCode=" + encodeURIComponent(classCode),
                { headers: { "Authorization": "Bearer " + authToken } }
            );

            const data = await response.json();
            loadingDiv.textContent = "";

            if (Array.isArray(data)) {
                data.forEach(s => {
                    const o1 = document.createElement("option");
                    o1.value = s;
                    o1.textContent = s;
                    student1.appendChild(o1);

                    const o2 = document.createElement("option");
                    o2.value = s;
                    o2.textContent = s;
                    student2.appendChild(o2);
                });
            } else {
                errorDiv.textContent = "Unexpected response from server.";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Unable to load students.";
            console.error(error);
        }
    }


    async function fetchSourceText(zipKey) {
        try {
            const response = await fetch(
                "/api/submissions/source?zipKey=" + encodeURIComponent(zipKey),
                { headers: { "Authorization": "Bearer " + authToken } }
            );

            if (!response.ok) return "(Could not load file content)";

            const data = await response.json();
            return data.text || "(No source files found in ZIP)";

        } catch (e) {
            return "(Error loading file content)";
        }
    }


    async function compareStudents() {

        const classCode = document.getElementById("classDropdown").value;
        const s1        = document.getElementById("student1Dropdown").value;
        const s2        = document.getElementById("student2Dropdown").value;

        const similarityDisplay = document.getElementById("similarityDisplay");
        const filesRow          = document.getElementById("filesRow");
        const errorDiv          = document.getElementById("errorMessage");
        const loadingDiv        = document.getElementById("loadingMessage");

        errorDiv.textContent = "";
        similarityDisplay.style.display = "none";
        filesRow.style.display = "none";

        if (!classCode || !s1 || !s2) {
            errorDiv.textContent = "Please select a class and two students.";
            return;
        }

        if (s1 === s2) {
            errorDiv.textContent = "Please select two different students.";
            return;
        }

        loadingDiv.textContent = "Comparing...";

        try {
            const response = await fetch("/api/compare", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + authToken
                },
                body: JSON.stringify({ classCode, student1: s1, student2: s2 })
            });

            const data = await response.json();
            loadingDiv.textContent = "";

            if (!data || !data.success) {
                errorDiv.textContent = data.message || "Compare failed.";
                return;
            }

            /* Similarity score */
            const pct = data.similarityPercent != null
                ? data.similarityPercent.toFixed(1) + "%"
                : "Pending";
            similarityDisplay.textContent = "Similarity: " + pct;
            similarityDisplay.style.display = "block";

            /* Show file boxes and load content */
            filesRow.style.display = "flex";
            document.getElementById("fileBox1Label").textContent = "Student 1 — " + s1;
            document.getElementById("fileBox2Label").textContent = "Student 2 — " + s2;
            document.getElementById("fileBox1").textContent = "Loading...";
            document.getElementById("fileBox2").textContent = "Loading...";

            if (data.student1ZipKey) {
                fetchSourceText(data.student1ZipKey).then(text => {
                    document.getElementById("fileBox1").textContent = text;
                });
            } else {
                document.getElementById("fileBox1").textContent = "(No file key returned)";
            }

            if (data.student2ZipKey) {
                fetchSourceText(data.student2ZipKey).then(text => {
                    document.getElementById("fileBox2").textContent = text;
                });
            } else {
                document.getElementById("fileBox2").textContent = "(No file key returned)";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Server error during compare.";
            console.error(error);
        }
    }

</script>

</body>
</html>
