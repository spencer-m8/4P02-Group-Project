<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <style>

        /* Page layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        /* Header bar */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
        }

        .logout-button {
            float: right;
            padding: 8px 14px;
            cursor: pointer;
        }

        /* Main container */
        .container {
            padding: 20px;
        }

        /* Dropdown */
        select {
            padding: 10px;
            margin-top: 10px;
            width: 300px;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Output */
        .output {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            max-width: 700px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .loading {
            color: blue;
            margin-top: 10px;
        }

    </style>

</head>
<body>

<div class="header">

    Teacher Dashboard

    <button class="logout-button" onclick="logout()">
        Logout
    </button>

</div>


<div class="container">

    <h3>Select Class</h3>

    <select id="classDropdown" onchange="loadStudents()">
        <option value="">-- Select Class --</option>
    </select>

    <h3>Select Students</h3>

    Student 1:
    <select id="student1Dropdown">
        <option value="">-- Select Student --</option>
    </select>

    Student 2:
    <select id="student2Dropdown">
        <option value="">-- Select Student --</option>
    </select>

    <button onclick="compareStudents()">
        Compare
    </button>

    <div id="loadingMessage" class="loading"></div>
    <div id="errorMessage" class="error"></div>

    <div id="output" class="output" style="display:none;"></div>

</div>


<script>

    let authToken = localStorage.getItem("authToken") || "";


    /*
    Load classes on page load
    */
    window.onload = function() {
        if (!authToken) {
            // Fix casing to match actual file name
            window.location.href = "teacher-Login.html";
            return;
        }

        loadClasses();
    };


    /*
    Logout function
    */
    function logout() {
        localStorage.removeItem("authToken");
        window.location.href = "teacher-Login.html";
    }


    /*
    Fetch list of classes
    */
    async function loadClasses() {

        const errorDiv = document.getElementById("errorMessage");
        const loadingDiv = document.getElementById("loadingMessage");
        const dropdown = document.getElementById("classDropdown");

        errorDiv.textContent = "";
        loadingDiv.textContent = "Loading classes...";

        try {
            const response = await fetch(
                "/api/classes",
                {
                    headers: {
                        "Authorization": "Bearer " + authToken
                    }
                }
            );

            const data = await response.json();

            loadingDiv.textContent = "";

            dropdown.innerHTML =
                '<option value="">-- Select Class --</option>';

            if (Array.isArray(data)) {
                data.forEach(c => {
                    const option = document.createElement("option");
                    option.value = c;
                    option.textContent = c;
                    dropdown.appendChild(option);
                });
            } else {
                errorDiv.textContent = "Unexpected response from server.";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Unable to load classes.";
            console.error(error);
        }
    }


    /*
    Fetch students for selected class
    */
    async function loadStudents() {

        const classCode =
            document.getElementById("classDropdown").value;

        const student1 = document.getElementById("student1Dropdown");
        const student2 = document.getElementById("student2Dropdown");
        const errorDiv = document.getElementById("errorMessage");
        const loadingDiv = document.getElementById("loadingMessage");

        errorDiv.textContent = "";
        document.getElementById("output").style.display = "none";

        student1.innerHTML = '<option value="">-- Select Student --</option>';
        student2.innerHTML = '<option value="">-- Select Student --</option>';

        if (!classCode) {
            return;
        }

        loadingDiv.textContent = "Loading students...";

        try {
            const response = await fetch(
                "/api/class/students?classCode=" + encodeURIComponent(classCode),
                {
                    headers: {
                        "Authorization": "Bearer " + authToken
                    }
                }
            );

            const data = await response.json();

            loadingDiv.textContent = "";

            if (Array.isArray(data)) {
                data.forEach(s => {
                    const o1 = document.createElement("option");
                    o1.value = s;
                    o1.textContent = s;
                    student1.appendChild(o1);

                    const o2 = document.createElement("option");
                    o2.value = s;
                    o2.textContent = s;
                    student2.appendChild(o2);
                });
            } else {
                errorDiv.textContent = "Unexpected response from server.";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Unable to load students.";
            console.error(error);
        }
    }


    /*
    Compare students
    */
    async function compareStudents() {

        const classCode = document.getElementById("classDropdown").value;
        const s1 = document.getElementById("student1Dropdown").value;
        const s2 = document.getElementById("student2Dropdown").value;

        const output = document.getElementById("output");
        const errorDiv = document.getElementById("errorMessage");
        const loadingDiv = document.getElementById("loadingMessage");

        errorDiv.textContent = "";
        output.style.display = "none";

        if (!classCode || !s1 || !s2) {
            errorDiv.textContent = "Please select a class and two students.";
            return;
        }

        if (s1 === s2) {
            errorDiv.textContent = "Please select two different students.";
            return;
        }

        loadingDiv.textContent = "Comparing...";

        try {
            const response = await fetch(
                "/api/compare",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + authToken
                    },
                    body: JSON.stringify({
                        classCode: classCode,
                        student1: s1,
                        student2: s2
                    })
                }
            );

            const data = await response.json();

            loadingDiv.textContent = "";

            if (data && data.success) {
                output.style.display = "block";
                output.textContent =
                    "Similarity: " + (data.similarityPercent ?? "N/A") + "%";
            } else {
                errorDiv.textContent = data.message || "Compare failed.";
            }

        } catch (error) {
            loadingDiv.textContent = "";
            errorDiv.textContent = "Server error during compare.";
            console.error(error);
        }
    }

</script>

</body>
</html>
