<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Submission</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f8;
}

/* Top bar */
.top-bar {
    background-color: #2c3e50;
    color: white;
    padding: 15px;
}

/* Back button */
.back-button {
    float: right;
    padding: 8px 16px;
    cursor: pointer;
}

/* Main container */
.container {
    padding: 20px;
}

/* Section */
.section {
    background: white;
    padding: 20px;
    border-radius: 5px;
    max-width: 400px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* Submit button */
.submit-button {
    margin-top: 15px;
    padding: 10px 20px;
    cursor: pointer;
}

/* Messages */
.success {
    color: green;
    margin-top: 10px;
}

.error {
    color: red;
    margin-top: 10px;
}

.loading {
    color: blue;
    margin-top: 10px;
}

</style>

</head>
<body>

<div class="top-bar">

    Student Submission

    <button class="back-button" onclick="goBack()">
        Change Class
    </button>

</div>


<div class="container">

    <div class="section">

        <h3 id="classDisplay"></h3>

        Student Name / ID:

        <input
            type="text"
            id="studentNameInput"
            placeholder="Enter your name or student ID"
        >

        Upload ZIP File:

        <input
            type="file"
            id="fileInput"
            accept=".zip"
        >

        <button
            class="submit-button"
            onclick="submitFile()">
            Submit
        </button>

        <div id="successMessage" class="success"></div>
        <div id="errorMessage" class="error"></div>
        <div id="loadingMessage" class="loading"></div>

    </div>

</div>


<script>

/*
State variables
*/
let classCode = "";
let studentSub = "";
let submissionFile = null;


/*
Extract classCode from URL
Example:
student-submission.html?classCode=COSC4P78
*/
function getClassCodeFromURL() {

    const params = new URLSearchParams(window.location.search);

    return params.get("classCode");

}


/*
Initialize page
*/
window.onload = function() {

    classCode = getClassCodeFromURL();

    if (!classCode) {

        window.location.href = "index.html";
        return;

    }

    document.getElementById("classDisplay").textContent =
        "Class: " + classCode;

}


/*
Back button
*/
function goBack() {

    window.location.href = "index.html";

}


/*
Submit file
*/
async function submitFile() {

    const successDiv = document.getElementById("successMessage");
    const errorDiv = document.getElementById("errorMessage");
    const loadingDiv = document.getElementById("loadingMessage");

    studentSub =
        document.getElementById("studentNameInput")
        .value
        .trim();

    submissionFile =
        document.getElementById("fileInput")
        .files[0];


    successDiv.textContent = "";
    errorDiv.textContent = "";


    /* Validation */

    if (!studentSub) {

        errorDiv.textContent =
            "Please enter your name or ID.";

        return;

    }

    if (!submissionFile) {

        errorDiv.textContent =
            "Please select a ZIP file.";

        return;

    }

    if (!submissionFile.name.endsWith(".zip")) {

        errorDiv.textContent =
            "Only ZIP files are allowed.";

        return;

    }


    loadingDiv.textContent = "Uploading...";


    try {

        /*
        Use FormData for file upload
        */

        const formData = new FormData();

        formData.append("classCode", classCode);
        formData.append("studentSub", studentSub);
        formData.append("submission", submissionFile);


        /*
        Backend endpoint:

        POST /api/submissions/upload
        */

        const response = await fetch(
            "http://localhost:8080/api/submissions/upload",
            {
                method: "POST",
                body: formData
            }
        );


        const data = await response.json();


        /*
        Expected response:

        {
            success: true,
            submissionID: "123"
        }
        */


        loadingDiv.textContent = "";

        if (data.success) {

            successDiv.textContent =
                "Submission successful.";

        }
        else {

            errorDiv.textContent =
                data.message || "Upload failed.";

        }

    }
    catch (error) {

        loadingDiv.textContent = "";

        errorDiv.textContent =
            "Server error.";

        console.error(error);

    }

}

</script>

</body>
</html>
