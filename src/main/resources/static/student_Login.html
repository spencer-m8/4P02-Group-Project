<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment Access</title>

    <style>

        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            height: 100vh;
        }

        /* Top bar */
        .top-bar {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        /* Teacher sign in button */
        .teacher-button {
            float: right;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Center container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        /* Input field */
        input {
            padding: 12px;
            font-size: 16px;
            width: 250px;
            margin-top: 10px;
        }

        /* Continue button */
        .continue-button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Error message */
        .error {
            margin-top: 10px;
            color: red;
            height: 20px;
        }

    </style>

</head>
<body>

<!-- Top right Teacher button -->
<div class="top-bar">
    <button class="teacher-button" onclick="teacherSignIn()">
        Teacher Sign In
    </button>
</div>

<!-- Main content -->
<div class="container">

    <h2>Enter Assignment Key</h2>

    <input
            type="text"
            id="assignmentKeyInput"
            placeholder="10-digit Assignment Key"
    >

    <button
            class="continue-button"
            onclick="submitAssignmentKey()">
        Continue
    </button>

    <div
            id="errorMessage"
            class="error">
    </div>

</div>


<script>

    /*
    Frontend state variables
    */
    let assignmentKey = "";


    /*
    Teacher Sign In Button Action
    Redirects to teacher login page
    */
    function teacherSignIn() {
        window.location.href = "teacher-Login.html";
    }


    /*
    Submit assignment key to backend
    */
    async function submitAssignmentKey() {

        assignmentKey = document
            .getElementById("assignmentKeyInput")
            .value
            .trim();

        const errorDiv = document.getElementById("errorMessage");

        // Validation
        if (!assignmentKey) {
            errorDiv.textContent = "Please enter an assignment key.";
            return;
        }

        if (!/^[0-9]{10}$/.test(assignmentKey)) {
            errorDiv.textContent = "Assignment key must be exactly 10 digits.";
            return;
        }

        errorDiv.textContent = "Checking assignment key...";

        try {
            // Relative URL so it works on localhost and deployments
            const response = await fetch(
                "/api/assignment/verify",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ assignmentKey: assignmentKey })
                }
            );

            const data = await response.json();

            if (data.success) {
                errorDiv.textContent = "";

                // Navigate to student submission page (preserve correct casing)
                window.location.href =
                    "student-Submission.html?assignmentKey=" + encodeURIComponent(assignmentKey);
            } else {
                errorDiv.textContent = data.message || "Invalid assignment key.";
            }

        } catch (error) {
            errorDiv.textContent = "Unable to connect to server.";
            console.error(error);
        }
    }

</script>

</body>
</html>
