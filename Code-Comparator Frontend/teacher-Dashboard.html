<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f8;
}

/* Top bar */
.top-bar {
    background-color: #2c3e50;
    color: white;
    padding: 15px;
}

.logout-button {
    float: right;
    padding: 8px 16px;
    cursor: pointer;
}

/* Main container */
.container {
    padding: 20px;
}

/* Section boxes */
.section {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 5px;
}

/* Lists */
select {
    width: 300px;
    padding: 8px;
    margin-top: 10px;
}

/* Compare button */
.compare-button {
    margin-top: 15px;
    padding: 10px 20px;
    cursor: pointer;
}

/* Result display */
.result {
    margin-top: 15px;
    font-weight: bold;
}

/* Error */
.error {
    color: red;
}

/* Loading */
.loading {
    color: blue;
}

</style>

</head>
<body>

<!-- Top Bar -->
<div class="top-bar">

    Teacher Dashboard

    <button class="logout-button" onclick="logout()">
        Logout
    </button>

</div>


<div class="container">

    <!-- Class Selection -->
    <div class="section">

        <h3>Select Class</h3>

        <select id="classList" onchange="loadStudents()">
            <option value="">-- Select Class --</option>
        </select>

    </div>


    <!-- Student Selection -->
    <div class="section">

        <h3>Select Students to Compare</h3>

        Student 1:<br>
        <select id="student1"></select>

        <br><br>

        Student 2:<br>
        <select id="student2"></select>

        <br>

        <button class="compare-button" onclick="compareStudents()">
            Compare
        </button>

        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
        <div id="loading" class="loading"></div>

    </div>

</div>


<script>

/*
State Variables
*/
let authToken = localStorage.getItem("authToken");
let selectedClass = "";
let studentReq1 = "";
let studentReq2 = "";


/*
Check authentication
*/
if (!authToken) {

    window.location.href = "teacher-login.html";

}


/*
Load classes on page load
*/
window.onload = loadClasses;


/*
Logout function
*/
function logout() {

    localStorage.removeItem("authToken");

    window.location.href = "index.html";

}


/*
Load classes from backend
*/
async function loadClasses() {

    const classSelect = document.getElementById("classList");

    try {

        const response = await fetch(
            "http://localhost:8080/api/classes",
            {
                method: "GET",
                headers: {
                    "Authorization": authToken
                }
            }
        );

        const data = await response.json();

        /*
        Expected format:

        {
            success: true,
            classList: [
                "COSC4P78",
                "COSC3P97"
            ]
        }
        */

        if (data.success) {

            data.classList.forEach(classCode => {

                const option = document.createElement("option");

                option.value = classCode;
                option.text = classCode;

                classSelect.appendChild(option);

            });

        }

    }
    catch (error) {

        console.error(error);

    }

}


/*
Load students when class selected
*/
async function loadStudents() {

    selectedClass =
        document.getElementById("classList").value;

    const student1Select =
        document.getElementById("student1");

    const student2Select =
        document.getElementById("student2");

    student1Select.innerHTML = "";
    student2Select.innerHTML = "";

    try {

        const response = await fetch(
            "http://localhost:8080/api/class/students?classCode=" + selectedClass,
            {
                method: "GET",
                headers: {
                    "Authorization": authToken
                }
            }
        );

        const data = await response.json();

        /*
        Expected format:

        {
            success: true,
            classList: [
                {
                    studentID: "s1",
                    studentName: "Alice"
                }
            ]
        }
        */

        if (data.success) {

            data.classList.forEach(student => {

                const option1 = document.createElement("option");
                option1.value = student.studentID;
                option1.text = student.studentName;

                const option2 = option1.cloneNode(true);

                student1Select.appendChild(option1);
                student2Select.appendChild(option2);

            });

        }

    }
    catch (error) {

        console.error(error);

    }

}


/*
Compare students
*/
async function compareStudents() {

    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");
    const loadingDiv = document.getElementById("loading");

    studentReq1 =
        document.getElementById("student1").value;

    studentReq2 =
        document.getElementById("student2").value;

    if (!studentReq1 || !studentReq2) {

        errorDiv.textContent =
            "Please select both students.";

        return;

    }

    errorDiv.textContent = "";
    resultDiv.textContent = "";
    loadingDiv.textContent = "Comparing...";


    try {

        const response = await fetch(
            "http://localhost:8080/api/compare",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": authToken
                },
                body: JSON.stringify({

                    classCode: selectedClass,
                    studentReq1: studentReq1,
                    studentReq2: studentReq2

                })
            }
        );

        const data = await response.json();

        /*
        Expected response:

        {
            success: true,
            similarityScore: 87.5
        }
        */

        loadingDiv.textContent = "";

        if (data.success) {

            resultDiv.textContent =
                "Similarity: " +
                data.similarityScore +
                "%";

        }
        else {

            errorDiv.textContent =
                data.message || "Comparison failed.";

        }

    }
    catch (error) {

        loadingDiv.textContent = "";
        errorDiv.textContent =
            "Server error.";

        console.error(error);

    }

}

</script>

</body>
</html>
