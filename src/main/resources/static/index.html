<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Code Similarity Comparator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: #ffffff;
      padding: 15px;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 200px;
      resize: vertical;
      font-family: monospace;
      margin-top: 10px;
    }

    .options {
      margin-bottom: 20px;
      background: #ffffff;
      padding: 15px;
      border-radius: 6px;
    }

    .options label {
      display: block;
      margin-bottom: 8px;
    }

    button {
      display: block;
      margin: 0 auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .results {
      margin-top: 20px;
      background: #ffffff;
      padding: 15px;
      border-radius: 6px;
    }

    .score {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .diff {
      font-family: monospace;
      white-space: pre-wrap;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>Code Similarity Comparator</h1>

  <div class="container">
    <!-- Code Input A -->
    <div class="panel">
      <h3>Code Input A</h3>
      <input type="file" id="fileA" />
      <textarea id="codeA" placeholder="Paste code here..."></textarea>
    </div>

    <!-- Code Input B -->
    <div class="panel">
      <h3>Code Input B</h3>
      <input type="file" id="fileB" />
      <textarea id="codeB" placeholder="Paste code here..."></textarea>
    </div>
  </div>

  <!-- Options Panel -->
  <div class="options">
    <h3>Comparison Options</h3>
    <label>
      <input type="checkbox" id="ignoreWhitespace" />
      Ignore Whitespace
    </label>
    <label>
      <input type="checkbox" id="ignoreComments" />
      Ignore Comments
    </label>
    <label>
      Algorithm:
      <select id="algorithm">
        <option value="TEXT">Text</option>
        <option value="TOKEN">Token</option>
        <option value="AST">AST</option>
      </select>
    </label>
  </div>

  <button id="compareBtn">Compare</button>

  <!-- Results Panel -->
  <div class="results" id="results" style="display:none;">
    <div class="score" id="score"></div>
    <div class="diff" id="diff"></div>
  </div>

  <script>
    // File upload handling
    function handleFileUpload(inputElement, textareaElement) {
      inputElement.addEventListener("change", () => {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          textareaElement.value = reader.result;
        };
        reader.readAsText(file);
      });
    }

    handleFileUpload(
      document.getElementById("fileA"),
      document.getElementById("codeA")
    );
    handleFileUpload(
      document.getElementById("fileB"),
      document.getElementById("codeB")
    );

    // Compare button logic
    document.getElementById("compareBtn").addEventListener("click", async () => {
      const codeA = document.getElementById("codeA").value;
      const codeB = document.getElementById("codeB").value;

      const options = {
        ignoreWhitespace: document.getElementById("ignoreWhitespace").checked,
        ignoreComments: document.getElementById("ignoreComments").checked,
        algorithm: document.getElementById("algorithm").value
      };

      // Mock API call (replace with real fetch)
      const result = mockCompare(codeA, codeB, options);

      displayResults(result);
    });

    // Mock comparison logic (frontend placeholder)
    function mockCompare(codeA, codeB, options) {
      const lengthA = codeA.length;
      const lengthB = codeB.length;

      const similarity =
        Math.min(lengthA, lengthB) /
        Math.max(lengthA || 1, lengthB || 1);

      return {
        similarityScore: (similarity * 100).toFixed(2),
        matchedLines: [
          "Line 1 in A matches Line 1 in B",
          "Line 3 in A partially matches Line 4 in B"
        ]
      };
    }

    function displayResults(result) {
      document.getElementById("results").style.display = "block";
      document.getElementById("score").textContent =
        "Similarity Score: " + result.similarityScore + "%";
      document.getElementById("diff").textContent =
        result.matchedLines.join("\n");
    }
  </script>
</body>
</html>
