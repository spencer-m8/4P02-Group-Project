<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Access</title>

<style>

/* Page styling */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
    height: 100vh;
}

/* Top bar */
.top-bar {
    width: 100%;
    padding: 15px 20px;
    box-sizing: border-box;
}

/* Teacher sign in button */
.teacher-button {
    float: right;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
}

/* Center container */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* Input field */
input {
    padding: 12px;
    font-size: 16px;
    width: 250px;
    margin-top: 10px;
}

/* Continue button */
.continue-button {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
}

/* Error message */
.error {
    margin-top: 10px;
    color: red;
    height: 20px;
}

</style>

</head>
<body>

<!-- Top right Teacher button -->
<div class="top-bar">
    <button class="teacher-button" onclick="teacherSignIn()">
        Teacher Sign In
    </button>
</div>

<!-- Main content -->
<div class="container">

    <h2>Enter Class Code</h2>

    <input 
        type="text" 
        id="classCodeInput" 
        placeholder="Class Code"
    >

    <button 
        class="continue-button" 
        onclick="submitClassCode()">
        Continue
    </button>

    <div 
        id="errorMessage" 
        class="error">
    </div>

</div>


<script>

/*
Frontend state variables
*/
let classCode = "";
let errorMessage = "";


/*
Teacher Sign In Button Action
Redirects to teacher login page
*/
function teacherSignIn() {

    // Redirect to teacher login page
    window.location.href = "Teacher-Login.html";

}


/*
Submit class code to backend
*/
async function submitClassCode() {

    classCode = document
        .getElementById("classCodeInput")
        .value
        .trim();

    const errorDiv = document.getElementById("errorMessage");

    // Validation
    if (classCode === "") {

        errorDiv.textContent = "Please enter a class code.";
        return;

    }

    errorDiv.textContent = "Checking class code...";


    try {

        /*
        BACKEND CONNECTION POINT

        Replace URL with your Spring Boot endpoint later
        Example:
        http://localhost:8080/api/class/verify
        */

        const response = await fetch(
            "http://localhost:8080/api/class/verify",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    classCode: classCode
                })
            }
        );


        const data = await response.json();


        /*
        Expected backend response format:

        {
            success: true/false,
            message: "text"
        }
        */


        if (data.success) {

            errorDiv.textContent = "";

            // Navigate to student page
            window.location.href =
                "student-submission.html?classCode=" + classCode;

        }
        else {

            errorDiv.textContent = data.message || "Invalid class code.";

        }

    }
    catch (error) {

        errorDiv.textContent =
            "Unable to connect to server.";

        console.error(error);

    }

}

</script>

</body>
</html>
